<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Jogo da Velha • Ultimate Tic-Tac-Toe</title>
    <meta name="description" content="Jogue Super Jogo da Velha (Ultimate Tic-Tac-Toe) online grátis! 9 tabuleiros interconectados. Desafie seus amigos ou jogue sozinho. 100% no navegador.">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Nosso CSS customizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fa-solid fa-chess-board"></i>
            </div>
            <h1>Super Jogo da Velha</h1>
            <p>Ultimate Tic-Tac-Toe • 9 tabuleiros em 1</p>
        </div>

        <!-- Info Bar -->
        <div class="info-bar">
            <!-- Turn Indicator -->
            <div class="turn-indicator" id="turn-indicator">
                <div class="turn-label">VEZ DO JOGADOR</div>
                <div class="player-symbol" id="player-symbol">X</div>
            </div>

            <!-- Buttons -->
            <div class="buttons">
                <button onclick="showRulesModal()" class="btn btn-secondary">
                    <i class="fa-solid fa-info-circle"></i>
                    <span>Regras</span>
                </button>
                <button onclick="restartGame()" class="btn btn-primary">
                    <i class="fa-solid fa-redo"></i>
                    <span>Reiniciar</span>
                </button>
            </div>
        </div>

        <!-- Game Board -->
        <div id="game-board" class="game-board"></div>

        <!-- Status -->
        <div id="status" class="status"></div>

        <!-- Tip -->
        <div class="tip">
            O primeiro jogador pode jogar em qualquer lugar. Depois, o próximo é obrigado a jogar no tabuleiro correspondente à casa marcada.
        </div>
    </div>

    <!-- Win / Draw Modal -->
    <div id="modal" class="modal" onclick="if (event.target.id === 'modal') closeModal()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <div id="modal-content-inner"></div>
            
            <div class="modal-buttons">
                <button onclick="restartFromModal()" class="btn btn-primary btn-large">
                    <i class="fa-solid fa-play"></i>
                    <span>JOGAR NOVAMENTE</span>
                </button>
                <button onclick="closeModal()" class="btn btn-text">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Nosso JavaScript -->
    <script src="script.js"></script>
</body>
</html>
